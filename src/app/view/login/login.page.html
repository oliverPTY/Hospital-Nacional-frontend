<form [formGroup]="form">
  <div class="container">
    <div class="card-container">
      <div class="card">
        <div class="header">
          <img src="assets/images/logoHN.svg" />
          <span>Hospital Nacional</span>
          <span>Sistema de Gestión de Pacientes</span>
        </div>
        <div class="body">
          <div class="user">
            <span>Usuario</span>
            <input type="text" placeholder="Ingrese su usuario" formControlName="username" />
          </div>

          <div class="password">
            <span>Contraseña</span>
            <input type="password" placeholder="Ingrese su contraseña" formControlName="password" />
          </div>
          @if (error()) {
            <div class="error">
              credenciales incorrectas
            </div>
          }
        </div>
        <div class="footer">
          <div class="botton">
            <span (click)="login()">Iniciar Sesión</span>
          </div>
          <div class="login-info">
            <span>Credenciales de prueba:</span>
            <span><strong>Usuario</strong> : admin</span>
            <span><strong>Contraseña</strong>: admin</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
